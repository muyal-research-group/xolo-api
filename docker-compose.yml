name: ${XOLO_COMPOSE_PROJECT_NAME:-xolo}

services:
  xolo-db:
    image: mongo:${XOLO_MONGO_IMAGE_TAG:-8-noble}
    container_name: ${XOLO_MONGO_CONTAINER_NAME:-xolo-mongodb}
    env_file:
      - ./deploy/env/mongodb.env
    command: ["mongod", "--config", "/etc/mongo/mongod.conf"]
    ports:
      - "${XOLO_MONGODB_PUBLIC_PORT:-27018}:27017"
    volumes:
      - ${XOLO_MONGO_VOLUME_NAME:-xolo-mongodb-data}:/data/db
      - ./db/mongod.conf:/etc/mongo/mongod.conf:ro
    networks:
      - xolo-net
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  xolo-cache:
    image: redis:${XOLO_REDIS_IMAGE_TAG:-7.0.11-alpine}
    container_name: ${XOLO_REDIS_CONTAINER_NAME:-xolo-redis}
    env_file:
      - ./deploy/env/redis.env
    command:
      - sh
      - -ec
      - |
        if [ -n "$${REDIS_REQUIREPASS}" ]; then
          exec redis-server --appendonly "$${REDIS_APPENDONLY}" --save "$${REDIS_SAVE}" --requirepass "$${REDIS_REQUIREPASS}"
        fi
        exec redis-server --appendonly "$${REDIS_APPENDONLY}" --save "$${REDIS_SAVE}"
    ports:
      - "${XOLO_REDIS_PUBLIC_PORT:-6379}:6379"
    volumes:
      - ${XOLO_REDIS_VOLUME_NAME:-xolo-redis-data}:/data
    networks:
      - xolo-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "if [ -n \"$${REDIS_REQUIREPASS}\" ]; then redis-cli -a \"$${REDIS_REQUIREPASS}\" ping; else redis-cli ping; fi",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  xolo:
    build:
      context: .
      dockerfile: ${XOLO_DOCKERFILE:-Dockerfile}
    image: ${XOLO_IMAGE:-xolo-api:latest}
    container_name: ${XOLO_API_CONTAINER_NAME:-xolo-api}
    env_file:
      - ${XOLO_APP_ENV_FILE:-./deploy/env/app.prod.env}
    command:
      - uvicorn
      - xoloapi.server:app
      - --host
      - ${XOLO_HOST:-0.0.0.0}
      - --port
      - ${XOLO_PORT:-10000}
      - --proxy-headers
      - --forwarded-allow-ips=*
      - --log-level
      - ${XOLO_UVICORN_LOG_LEVEL:-info}
    ports:
      - "${XOLO_API_PUBLIC_PORT:-10000}:${XOLO_PORT:-10000}"
    volumes:
      - ${XOLO_DATA_VOLUME_NAME:-xolo-data}:/xolo
      - ${XOLO_LOG_VOLUME_NAME:-xolo-logs}:/app/log
    networks:
      - xolo-net
    depends_on:
      xolo-db:
        condition: service_healthy
      xolo-cache:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os, urllib.request; urllib.request.urlopen(f'http://127.0.0.1:{os.environ.get(\"XOLO_PORT\", \"10000\")}/openapi.json', timeout=5).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

networks:
  xolo-net:
    name: ${XOLO_NETWORK_NAME:-xolo-net}
    external: true

volumes:
  xolo-mongodb-data:
    name: ${XOLO_MONGO_VOLUME_NAME:-xolo-mongodb-data}
  xolo-redis-data:
    name: ${XOLO_REDIS_VOLUME_NAME:-xolo-redis-data}
  xolo-data:
    name: ${XOLO_DATA_VOLUME_NAME:-xolo-data}
  xolo-logs:
    name: ${XOLO_LOG_VOLUME_NAME:-xolo-logs}
